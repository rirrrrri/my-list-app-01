<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Мои списки</title>
    
    <!-- PWA Meta -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0c10">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Мои списки">
    
    <!-- Иконки для разных устройств -->
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="manifest" href="site.webmanifest">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            font-size: 16px;
        }
        
        :root[data-scale="small"] { font-size: 14px; }
        :root[data-scale="medium"] { font-size: 17px; }
        :root[data-scale="large"] { font-size: 20px; }

        :root {
            --bg-body: linear-gradient(135deg, #0a0c10 0%, #0f1219 100%);
            --bg-panel: rgba(17, 22, 31, 0.95);
            --bg-card: #0f1219;
            --bg-item: #0b0e14;
            --text-primary: #e4e6eb;
            --text-secondary: #8e95a8;
            --border-color: #252a36;
            --input-bg: #1e293b;
            --badge-bg: linear-gradient(135deg, #1f2a3e, #162032);
            --shadow: 0 8px 25px rgba(0,0,0,0.3);
            --transition-speed: 0.2s;
        }

        body.light {
            --bg-body: linear-gradient(135deg, #f0f2f5 0%, #e8ecf1 100%);
            --bg-panel: rgba(255, 255, 255, 0.95);
            --bg-card: #ffffff;
            --bg-item: #f8f9fa;
            --text-primary: #1a1a2e;
            --text-secondary: #4a5568;
            --border-color: #e2e8f0;
            --input-bg: #ffffff;
            --badge-bg: linear-gradient(135deg, #e2e8f0, #cbd5e1);
            --shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        body {
            background: var(--bg-body);
            color: var(--text-primary);
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 1rem;
            line-height: 1.4;
            min-height: 100vh;
            transition: background 0.3s ease;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .list-title-wrapper {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex: 1;
        }

        .list-title-input {
            font-size: 1.5rem;
            font-weight: bold;
            background: transparent;
            border: none;
            color: var(--text-primary);
            padding: 0.3rem 0.5rem;
            border-radius: 12px;
            font-family: inherit;
            max-width: 280px;
        }

        .list-title-input:focus {
            outline: none;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
        }

        .edit-title-btn {
            background: none;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            padding: 0.3rem;
            border-radius: 8px;
            color: var(--text-secondary);
        }

        .action-buttons {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .action-btn {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 40px;
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: var(--shadow);
            color: var(--text-primary);
        }

        .action-btn:active {
            transform: scale(0.95);
        }

        .app-layout {
            display: flex;
            gap: 1rem;
            transition: all var(--transition-speed) ease;
        }

        .sections-sidebar {
            background: var(--bg-panel);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 0.8rem;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255,255,255,0.05);
            transition: all var(--transition-speed) ease;
            overflow-x: hidden;
        }

        .sections-sidebar.wide {
            flex: 1;
        }

        .sections-sidebar.narrow {
            flex: 1;
            min-width: 150px;
            max-width: 220px;
        }

        .content-area {
            flex: 3;
            min-width: 0;
        }

        .new-section-btn {
            width: 100%;
            margin-bottom: 0.8rem;
            background: linear-gradient(135deg, #2d3a5e, #1e2a4a);
            border: none;
            color: white;
            padding: 0.6rem;
            border-radius: 12px;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
        }

        body.light .new-section-btn {
            background: linear-gradient(135deg, #cbd5e1, #94a3b8);
            color: #1a1a2e;
        }

        .compact-sections-list {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .compact-section-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem;
            background: var(--bg-card);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.15s ease;
            border-left: 3px solid;
        }

        .compact-section-item:active {
            transform: translateX(3px);
        }

        .compact-section-name {
            font-size: 0.85rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .expanded-section {
            background: var(--bg-panel);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 1rem;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255,255,255,0.05);
            animation: slideIn 0.25s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .section-header-expanded {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 0.8rem;
        }

        .section-title-wrapper {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .section-title-large {
            font-size: 1.4rem;
            font-weight: bold;
        }

        .section-desc-large {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }

        .editor-panel {
            background: var(--bg-panel);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 1rem;
            margin-top: 1rem;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .editor-panel.hidden {
            display: none;
        }

        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .editor-header h3 {
            font-size: 0.95rem;
        }

        .close-editor-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.3rem 0.6rem;
            border-radius: 8px;
            color: var(--text-secondary);
        }

        .item-li {
            background: var(--bg-item);
            margin: 0.6rem 0;
            padding: 0.8rem;
            border-radius: 14px;
            display: flex;
            flex-wrap: wrap;
            align-items: flex-start;
            gap: 0.6rem;
            border-left-width: 3px;
            border-left-style: solid;
            transition: all 0.15s ease;
        }

        .item-check {
            appearance: none;
            -webkit-appearance: none;
            width: 1.4rem;
            height: 1.4rem;
            background: var(--input-bg);
            border-radius: 6px;
            border: 2px solid;
            cursor: pointer;
            position: relative;
            transition: all 0.15s ease;
            flex-shrink: 0;
        }

        .item-check:checked::after {
            content: '✓';
            position: absolute;
            color: white;
            font-size: 0.9rem;
            font-weight: bold;
            left: 0.25rem;
            top: -0.1rem;
        }

        .item-content {
            flex: 1;
            min-width: 100px;
        }

        .item-name {
            font-weight: 600;
            word-break: break-word;
            font-size: 0.95rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .item-name-collapse {
            background: none;
            border: none;
            font-size: 0.85rem;
            cursor: pointer;
            padding: 0.1rem 0.3rem;
            color: var(--text-secondary);
        }

        .item-details {
            margin-top: 0.4rem;
            overflow: hidden;
            transition: all 0.2s ease;
        }

        .item-details.collapsed {
            display: none;
        }

        .item-desc {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 0.2rem;
        }

        .item-img {
            max-width: 7rem;
            max-height: 7rem;
            border-radius: 12px;
            object-fit: cover;
            margin-top: 0.3rem;
        }

        .item-link-btn {
            background: none;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            padding: 0.2rem;
            transition: transform 0.1s;
            display: inline-block;
            margin-top: 0.3rem;
        }

        .item-link-btn:active {
            transform: scale(0.9);
        }

        .item-actions {
            display: flex;
            gap: 0.4rem;
            align-items: center;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.2s ease;
        }

        .modal-content {
            background: var(--bg-panel);
            border-radius: 24px;
            padding: 1.5rem;
            max-width: 90%;
            width: 340px;
            text-align: center;
            animation: slideUp 0.2s ease;
        }

        .modal-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 1rem;
        }

        .color-palette {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin: 0.6rem 0;
            justify-content: center;
        }

        .color-option {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.1s;
        }

        .color-option.selected {
            border-color: white;
            transform: scale(1.1);
        }

        body.light .color-option.selected {
            border-color: #1a1a2e;
        }

        .settings-panel {
            background: var(--bg-panel);
            border-radius: 20px;
            padding: 0.8rem;
            margin-bottom: 1rem;
        }

        .settings-panel.hidden {
            display: none;
        }

        .settings-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .settings-label {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        .theme-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
        }

        .theme-text {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 52px;
            height: 26px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #3b82f6;
            transition: 0.3s;
            border-radius: 26px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        input:checked + .toggle-slider:before {
            transform: translateX(26px);
        }

        .scale-buttons {
            display: flex;
            gap: 0.6rem;
        }

        .scale-btn {
            padding: 0.4rem 0.8rem;
            font-size: 0.8rem;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            cursor: pointer;
            border-radius: 12px;
        }

        .scale-btn.active {
            background: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }

        hr {
            margin: 0.8rem 0;
            border-color: var(--border-color);
        }

        button {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: none;
            color: white;
            padding: 0.6rem 1.1rem;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        body.light button {
            background: linear-gradient(135deg, #e2e8f0, #cbd5e1);
            color: #1a1a2e;
        }

        button.small {
            padding: 0.3rem 0.7rem;
            font-size: 0.75rem;
        }

        .success-message {
            background: #1e3a2f;
            color: #8bffc5;
            padding: 0.6rem;
            border-radius: 12px;
            margin-top: 0.7rem;
            text-align: center;
            font-size: 0.8rem;
            animation: fadeOut 2s ease-out forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }

        .form-group {
            margin-bottom: 0.8rem;
        }

        label {
            display: block;
            margin-bottom: 0.3rem;
            font-weight: 500;
            font-size: 0.8rem;
        }

        input, textarea {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.6rem 0.8rem;
            border-radius: 12px;
            font-size: 0.9rem;
            font-family: inherit;
        }

        .file-input-label {
            display: inline-block;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            padding: 0.6rem 1.1rem;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        body.light .file-input-label {
            background: linear-gradient(135deg, #e2e8f0, #cbd5e1);
            color: #1a1a2e;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @media (max-width: 600px) {
            body {
                padding: 0.8rem;
            }
            .app-layout {
                flex-direction: column;
            }
            .sections-sidebar.narrow {
                max-width: 100%;
                min-width: auto;
            }
            .compact-sections-list {
                flex-direction: row;
                overflow-x: auto;
                padding-bottom: 0.3rem;
            }
            .compact-section-item {
                min-width: 110px;
            }
            .list-title-input {
                font-size: 1.2rem;
                max-width: 180px;
            }
            .action-buttons {
                gap: 0.3rem;
            }
            .action-btn {
                padding: 0.4rem 0.7rem;
                font-size: 0.75rem;
            }
            .item-img {
                max-width: 5rem;
                max-height: 5rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="app-header">
        <div class="list-title-wrapper">
            <input type="text" class="list-title-input" id="listTitleInput" value="Мои списки" maxlength="30">
            <button class="edit-title-btn" id="editTitleBtn" title="Редактировать название">✏️</button>
        </div>
        <div class="action-buttons">
            <button class="action-btn" id="exportBtn">📤 Поделиться</button>
            <button class="action-btn" id="settingsToggleBtn">⚙️ Настройки</button>
        </div>
    </div>

    <div class="settings-panel hidden" id="settingsPanel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.7rem;">
            <h3 style="font-size: 0.95rem;">⚙️ Настройки</h3>
            <button id="closeSettingsBtn" class="small">✖️</button>
        </div>
        
        <div class="theme-row">
            <span class="theme-text">☀️ Светлая тема</span>
            <label class="toggle-switch">
                <input type="checkbox" id="themeToggleCheckbox">
                <span class="toggle-slider"></span>
            </label>
            <span class="theme-text">🌙 Тёмная тема</span>
        </div>
        
        <hr>
        
        <div class="settings-row">
            <span class="settings-label">🔍 Размер интерфейса:</span>
            <div class="scale-buttons">
                <button class="scale-btn" data-scale="small">Мелкий</button>
                <button class="scale-btn" data-scale="medium">Средний</button>
                <button class="scale-btn" data-scale="large">Крупный</button>
            </div>
        </div>
        
        <hr>
        
        <div class="settings-row">
            <span class="settings-label">📂 Импорт списка:</span>
            <label class="file-input-label">
                📁 Выбрать файл
                <input type="file" id="importFileInput" accept=".json" style="display: none;">
            </label>
        </div>
        <p style="font-size: 0.65rem; color: var(--text-secondary); margin-top: -0.3rem;">* Загрузите .json файл с экспортированным списком</p>
    </div>

    <div class="app-layout" id="appLayout">
        <div class="sections-sidebar" id="sectionsSidebar">
            <button class="new-section-btn" id="newSectionBtn">➕ Новый раздел</button>
            <div id="compactSectionsList"></div>
        </div>

        <div class="content-area" id="contentArea">
            <div id="expandedSectionContainer"></div>
            
            <div class="editor-panel hidden" id="editorPanel">
                <div class="editor-header">
                    <h3>✏️ Редактор пункта</h3>
                    <button class="close-editor-btn" id="closeEditorBtn" title="Закрыть редактор">✖️</button>
                </div>
                <div class="form-group">
                    <label>Название пункта</label>
                    <input type="text" id="itemNameInput" placeholder="Название...">
                </div>
                <div class="form-group">
                    <label>Описание пункта</label>
                    <textarea id="itemDescInput" placeholder="Описание..." rows="2"></textarea>
                </div>
                <div class="form-group">
                    <label>🖼️ Картинка (URL)</label>
                    <input type="text" id="itemImageUrl" placeholder="https://...">
                    <div id="imagePreview" style="max-width: 3.5rem; margin-top: 0.3rem;"></div>
                </div>
                <div class="form-group">
                    <label>🔗 Ссылка (URL)</label>
                    <input type="text" id="itemLinkUrl" placeholder="https://example.com">
                </div>
                <button id="addItemBtn" style="background: #226622;">➕ Добавить/обновить</button>
                <button id="clearItemFormBtn" style="background: #3a2c2c;">Очистить</button>
                <div id="itemMessage"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const colorPalette = [
        '#3b82f6', '#10b981', '#ef4444', '#f59e0b', '#8b5cf6',
        '#ec4899', '#06b6d4', '#84cc16', '#f97316', '#6b7280'
    ];
    
    let allSections = [];
    let selectedSectionId = null;
    let isEditorVisible = false;
    let isSettingsVisible = false;
    let listTitle = "Мои списки";
    
    const compactListDiv = document.getElementById('compactSectionsList');
    const expandedContainer = document.getElementById('expandedSectionContainer');
    const editorPanel = document.getElementById('editorPanel');
    const settingsPanel = document.getElementById('settingsPanel');
    const settingsToggleBtn = document.getElementById('settingsToggleBtn');
    const closeSettingsBtn = document.getElementById('closeSettingsBtn');
    const sectionsSidebar = document.getElementById('sectionsSidebar');
    const themeToggleCheckbox = document.getElementById('themeToggleCheckbox');
    const listTitleInput = document.getElementById('listTitleInput');
    const editTitleBtn = document.getElementById('editTitleBtn');
    const exportBtn = document.getElementById('exportBtn');
    const importFileInput = document.getElementById('importFileInput');
    const newSectionBtn = document.getElementById('newSectionBtn');
    const closeEditorBtn = document.getElementById('closeEditorBtn');
    
    const itemNameInput = document.getElementById('itemNameInput');
    const itemDescInput = document.getElementById('itemDescInput');
    const itemImageUrl = document.getElementById('itemImageUrl');
    const itemLinkUrl = document.getElementById('itemLinkUrl');
    const imagePreview = document.getElementById('imagePreview');
    const itemMessage = document.getElementById('itemMessage');
    
    let editingItemMeta = null;
    
    // PWA: регистрация сервис-воркера
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').then(reg => {
            console.log('Service Worker registered!');
        }).catch(err => {
            console.log('Service Worker registration failed:', err);
        });
    }
    
    // МАСШТАБ
    function setScale(scaleValue) {
        document.documentElement.setAttribute('data-scale', scaleValue);
        localStorage.setItem('appScale', scaleValue);
        document.querySelectorAll('.scale-btn').forEach(btn => {
            if (btn.getAttribute('data-scale') === scaleValue) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }
    
    function loadScale() {
        const saved = localStorage.getItem('appScale');
        if (saved && ['small', 'medium', 'large'].includes(saved)) setScale(saved);
        else setScale('medium');
    }
    
    // ТЕМА
    function setTheme(isLight) {
        if (isLight) {
            document.body.classList.add('light');
            themeToggleCheckbox.checked = true;
        } else {
            document.body.classList.remove('light');
            themeToggleCheckbox.checked = false;
        }
        localStorage.setItem('appTheme', isLight ? 'light' : 'dark');
    }
    
    function toggleTheme() {
        setTheme(!document.body.classList.contains('light'));
    }
    
    function loadTheme() {
        setTheme(localStorage.getItem('appTheme') === 'light');
    }
    
    // НАЗВАНИЕ СПИСКА
    function loadListTitle() {
        const saved = localStorage.getItem('listTitle');
        if (saved) {
            listTitle = saved;
            listTitleInput.value = listTitle;
        }
    }
    
    function saveListTitle() {
        listTitle = listTitleInput.value.trim() || "Мои списки";
        listTitleInput.value = listTitle;
        localStorage.setItem('listTitle', listTitle);
    }
    
    // ЭКСПОРТ / ИМПОРТ
    function exportToFile() {
        const dataToExport = {
            version: "1.0",
            exportDate: new Date().toISOString(),
            title: listTitle,
            sections: allSections
        };
        
        const jsonStr = JSON.stringify(dataToExport, null, 2);
        const blob = new Blob([jsonStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        
        const a = document.createElement('a');
        a.href = url;
        a.download = `${listTitle.replace(/[^a-zа-яё0-9]/gi, '_')}_список.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        showMessage(itemMessage, '📁 Файл с списком скачан!', false);
    }
    
    function importFromFile(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const data = JSON.parse(e.target.result);
                
                if (data.sections && Array.isArray(data.sections)) {
                    allSections = data.sections;
                    
                    for (let s of allSections) {
                        if (!s.color) s.color = '#3b82f6';
                        if (s.items) {
                            for (let i of s.items) {
                                if (i.checked === undefined) i.checked = false;
                                if (i.link === undefined) i.link = '';
                                if (i.collapsed === undefined) i.collapsed = true;
                            }
                        } else {
                            s.items = [];
                        }
                    }
                    
                    if (data.title) {
                        listTitleInput.value = data.title;
                        saveListTitle();
                    }
                    
                    if (allSections.length > 0) {
                        selectedSectionId = allSections[0].id;
                    }
                    
                    saveToLocalStorage();
                    renderAll();
                    showMessage(itemMessage, '✅ Список успешно импортирован!', false);
                } else {
                    throw new Error('Неверный формат файла');
                }
            } catch (err) {
                showMessage(itemMessage, '❌ Ошибка: неверный формат файла', true);
            }
        };
        reader.onerror = () => {
            showMessage(itemMessage, '❌ Ошибка при чтении файла', true);
        };
        reader.readAsText(file);
    }
    
    // ОСНОВНЫЕ ФУНКЦИИ
    function showMessage(element, text, isError = false) {
        element.innerHTML = `<div class="success-message" style="background:${isError ? '#5c2e3a' : '#1e3a2f'}">${text}</div>`;
        setTimeout(() => { if (element.innerHTML.includes(text)) element.innerHTML = ''; }, 2500);
    }
    
    function toggleEditor(show) {
        isEditorVisible = show;
        editorPanel.classList.toggle('hidden', !show);
        if (!show) {
            clearItemForm();
        }
    }
    
    function toggleSettings(show) {
        isSettingsVisible = show;
        settingsPanel.classList.toggle('hidden', !show);
    }
    
    function saveToLocalStorage() {
        localStorage.setItem('taskManagerApp', JSON.stringify(allSections));
        localStorage.setItem('listTitle', listTitle);
    }
    
    function loadFromLocalStorage() {
        const saved = localStorage.getItem('taskManagerApp');
        if (saved) {
            allSections = JSON.parse(saved);
            for (let s of allSections) {
                if (!s.color) s.color = '#3b82f6';
                if (s.items) {
                    for (let i of s.items) {
                        if (i.checked === undefined) i.checked = false;
                        if (i.link === undefined) i.link = '';
                        if (i.collapsed === undefined) i.collapsed = true;
                    }
                } else s.items = [];
            }
        } else {
            allSections = [
                { id: 'sec1', name: 'Изучение JS', description: 'Вспомнить основы', color: '#3b82f6', items: [
                    { id: 'it1', name: 'Переменные', description: 'let/const', imageUrl: '', link: '', checked: false, collapsed: true },
                    { id: 'it2', name: 'Работа с DOM', description: 'добавить картинку', imageUrl: 'https://picsum.photos/id/1/80/80', link: 'https://developer.mozilla.org/ru/docs/Web/API/Document_Object_Model', checked: true, collapsed: true }
                ] },
                { id: 'sec2', name: 'Домашние дела', description: 'Список по дому', color: '#10b981', items: [
                    { id: 'it3', name: 'Полить цветы', description: 'вечером', imageUrl: '', link: '', checked: false, collapsed: true }
                ] }
            ];
        }
        
        if (allSections.length > 0 && !selectedSectionId) selectedSectionId = allSections[0].id;
    }
    
    // СОЗДАНИЕ НОВОГО РАЗДЕЛА
    function createNewSection() {
        const modal = document.createElement('div');
        modal.className = 'modal-overlay section-editor-modal';
        modal.innerHTML = `
            <div class="modal-content">
                <h4 style="font-size: 1.1rem;">✨ Новый раздел</h4>
                <div class="form-group">
                    <label>Название раздела</label>
                    <input type="text" id="newSectionName" placeholder="Например: Работа">
                </div>
                <div class="form-group">
                    <label>Описание раздела</label>
                    <textarea id="newSectionDesc" rows="2" placeholder="Краткое описание..."></textarea>
                </div>
                <div class="form-group">
                    <label>🎨 Выберите цвет</label>
                    <div class="color-palette" id="newColorPalette"></div>
                </div>
                <div class="modal-buttons" style="margin-top: 1rem;">
                    <button id="createSectionBtn">✅ Создать</button>
                    <button id="cancelCreateBtn">Отмена</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        
        const paletteDiv = modal.querySelector('#newColorPalette');
        let selectedColor = '#3b82f6';
        colorPalette.forEach(color => {
            const colorDiv = document.createElement('div');
            colorDiv.className = 'color-option';
            colorDiv.style.backgroundColor = color;
            if (color === selectedColor) colorDiv.classList.add('selected');
            colorDiv.onclick = () => {
                paletteDiv.querySelectorAll('.color-option').forEach(c => c.classList.remove('selected'));
                colorDiv.classList.add('selected');
                selectedColor = color;
            };
            paletteDiv.appendChild(colorDiv);
        });
        
        modal.querySelector('#createSectionBtn').onclick = () => {
            const name = modal.querySelector('#newSectionName').value.trim();
            if (!name) {
                alert('Введите название раздела');
                return;
            }
            const newId = Date.now() + '-' + Math.random();
            allSections.push({
                id: newId,
                name: name,
                description: modal.querySelector('#newSectionDesc').value,
                color: selectedColor,
                items: []
            });
            selectedSectionId = newId;
            modal.remove();
            renderAll();
            showMessage(itemMessage, `🎉 Раздел "${name}" создан!`, false);
        };
        
        modal.querySelector('#cancelCreateBtn').onclick = () => modal.remove();
        modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
    }
    
    // РЕДАКТИРОВАНИЕ РАЗДЕЛА
    function showSectionEditor(section) {
        const modal = document.createElement('div');
        modal.className = 'modal-overlay section-editor-modal';
        modal.innerHTML = `
            <div class="modal-content">
                <h4 style="font-size: 1.1rem;">✏️ Редактировать раздел</h4>
                <div class="form-group">
                    <label>Название</label>
                    <input type="text" id="editSectionName" value="${escapeHtml(section.name)}">
                </div>
                <div class="form-group">
                    <label>Описание</label>
                    <textarea id="editSectionDesc" rows="2">${escapeHtml(section.description)}</textarea>
                </div>
                <div class="form-group">
                    <label>🎨 Цвет раздела</label>
                    <div class="color-palette" id="colorPalette"></div>
                </div>
                <div class="modal-buttons" style="margin-top: 1rem;">
                    <button id="saveSectionEdit">💾 Сохранить</button>
                    <button id="cancelSectionEdit">Отмена</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        
        const paletteDiv = modal.querySelector('#colorPalette');
        colorPalette.forEach(color => {
            const colorDiv = document.createElement('div');
            colorDiv.className = 'color-option';
            colorDiv.style.backgroundColor = color;
            if (section.color === color) colorDiv.classList.add('selected');
            colorDiv.onclick = () => {
                paletteDiv.querySelectorAll('.color-option').forEach(c => c.classList.remove('selected'));
                colorDiv.classList.add('selected');
            };
            paletteDiv.appendChild(colorDiv);
        });
        
        modal.querySelector('#saveSectionEdit').onclick = () => {
            const newName = modal.querySelector('#editSectionName').value.trim();
            if (newName) section.name = newName;
            section.description = modal.querySelector('#editSectionDesc').value;
            const selectedColor = paletteDiv.querySelector('.color-option.selected')?.style.backgroundColor;
            if (selectedColor) section.color = selectedColor;
            modal.remove();
            renderAll();
            showMessage(itemMessage, '✏️ Раздел обновлён', false);
        };
        
        modal.querySelector('#cancelSectionEdit').onclick = () => modal.remove();
        modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
    }
    
    // ОТРИСОВКА
    function renderAll() {
        renderCompactSidebar();
        renderExpandedSection();
        saveToLocalStorage();
        updateSidebarWidth();
    }
    
    function updateSidebarWidth() {
        if (selectedSectionId) {
            sectionsSidebar.classList.add('narrow');
            sectionsSidebar.classList.remove('wide');
        } else {
            sectionsSidebar.classList.add('wide');
            sectionsSidebar.classList.remove('narrow');
        }
    }
    
    function renderCompactSidebar() {
        if (!compactListDiv) return;
        if (allSections.length === 0) {
            compactListDiv.innerHTML = '<div style="text-align:center; padding:1rem; font-size:0.8rem;">📭 Нет разделов<br>Нажмите "➕ Новый раздел"</div>';
            return;
        }
        
        let html = '<div class="compact-sections-list">';
        for (let section of allSections) {
            const isSelected = (selectedSectionId === section.id);
            const borderColor = section.color || '#3b82f6';
            html += `
                <div class="compact-section-item" data-id="${section.id}" style="border-left-color: ${borderColor}; background: ${isSelected ? 'var(--border-color)' : 'var(--bg-card)'}">
                    <div class="compact-section-name" style="color: ${borderColor};">${escapeHtml(section.name)}</div>
                </div>
            `;
        }
        html += '</div>';
        compactListDiv.innerHTML = html;
        
        document.querySelectorAll('.compact-section-item').forEach(el => {
            el.addEventListener('click', () => {
                selectedSectionId = el.getAttribute('data-id');
                renderAll();
            });
        });
    }
    
    function renderExpandedSection() {
        if (!expandedContainer) return;
        
        if (!selectedSectionId) {
            expandedContainer.innerHTML = `
                <div class="expanded-section" style="text-align:center; padding:2rem;">
                    <p style="font-size:1rem;">📁 Выберите раздел из списка слева</p>
                </div>
            `;
            return;
        }
        
        const section = allSections.find(s => s.id === selectedSectionId);
        if (!section) {
            selectedSectionId = null;
            renderAll();
            return;
        }
        
        const borderColor = section.color || '#3b82f6';
        const totalItems = section.items.length;
        const completedItems = section.items.filter(i => i.checked).length;
        const percent = totalItems === 0 ? 0 : (completedItems / totalItems) * 100;
        
        let itemsHtml = '';
        for (let item of section.items) {
            const checkedAttr = item.checked ? 'checked' : '';
            const itemNameStyle = item.checked ? 'text-decoration: line-through; opacity: 0.7;' : '';
            const collapseIcon = item.collapsed ? '▼' : '▲';
            
            itemsHtml += `
                <li class="item-li" style="border-left-color: ${borderColor};">
                    <input type="checkbox" class="item-check" style="border-color: ${borderColor};" data-item-id="${item.id}" ${checkedAttr}>
                    <div class="item-content">
                        <div class="item-name" style="${itemNameStyle}">
                            <button class="item-name-collapse" data-item-id="${item.id}">${collapseIcon}</button>
                            ${escapeHtml(item.name)}
                        </div>
                        <div class="item-details ${item.collapsed ? 'collapsed' : ''}">
                            <div class="item-desc">${escapeHtml(item.description)}</div>
                            ${item.imageUrl ? `<img class="item-img" src="${escapeHtml(item.imageUrl)}" onerror="this.style.display='none'">` : ''}
                            ${item.link ? `<button class="item-link-btn" data-link="${escapeHtml(item.link)}">🔗</button>` : ''}
                        </div>
                    </div>
                    <div class="item-actions">
                        <button class="small edit-item-btn" data-item-id="${item.id}">✏️</button>
                        <button class="small delete-item-btn" data-item-id="${item.id}">🗑</button>
                    </div>
                </li>
            `;
        }
        
        expandedContainer.innerHTML = `
            <div class="expanded-section">
                <div class="section-header-expanded">
                    <div class="section-title-wrapper">
                        <div class="section-title-large" style="color: ${borderColor};">${escapeHtml(section.name)}</div>
                    </div>
                    <div style="display: flex; gap: 0.5rem;">
                        <button id="addNewItemBtn" class="small" style="background: #226622;">➕ Новый пункт</button>
                        <button id="editSectionBtn" class="small">✏️ Редактировать</button>
                        <button id="deleteSectionBtn" class="small" style="background:#5c2e3a;">🗑 Удалить</button>
                    </div>
                </div>
                <div class="section-desc-large">${escapeHtml(section.description)}</div>
                <div class="progress-bar-container" style="margin: 0.5rem 0;">
                    <div class="progress-stats" style="display:flex; justify-content:space-between; font-size:0.75rem;">
                        <span>✅ ${completedItems}/${totalItems}</span>
                        <span>${Math.round(percent)}%</span>
                    </div>
                    <div class="progress-bg" style="background:var(--border-color); border-radius:8px; height:5px;">
                        <div class="progress-fill" style="background:${borderColor}; width:${percent}%; height:100%; border-radius:8px;"></div>
                    </div>
                </div>
                <ul class="items-list" style="margin-top:0.8rem;">${itemsHtml || '<li style="color:var(--text-secondary); padding:0.5rem; font-size:0.85rem;">📭 Нет пунктов. Нажмите "➕ Новый пункт" чтобы добавить</li>'}</ul>
            </div>
        `;
        
        document.getElementById('addNewItemBtn')?.addEventListener('click', () => {
            clearItemForm();
            editingItemMeta = null;
            toggleEditor(true);
        });
        
        document.getElementById('editSectionBtn')?.addEventListener('click', () => showSectionEditor(section));
        
        document.getElementById('deleteSectionBtn')?.addEventListener('click', () => {
            if (confirm('Удалить раздел и все пункты?')) {
                allSections = allSections.filter(s => s.id !== section.id);
                if (selectedSectionId === section.id) selectedSectionId = null;
                renderAll();
                showMessage(itemMessage, '✅ Раздел удалён', false);
            }
        });
        
        document.querySelectorAll('.item-name-collapse').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const itemId = btn.getAttribute('data-item-id');
                const item = section.items.find(i => i.id === itemId);
                if (item) {
                    item.collapsed = !item.collapsed;
                    renderAll();
                }
            });
        });
        
        document.querySelectorAll('.item-check').forEach(ch => {
            ch.addEventListener('change', (e) => {
                const itemId = ch.getAttribute('data-item-id');
                const item = section.items.find(i => i.id === itemId);
                if (item) {
                    item.checked = ch.checked;
                    renderAll();
                }
            });
        });
        
        document.querySelectorAll('.item-link-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const link = btn.getAttribute('data-link');
                if (link) showLinkModal(link);
            });
        });
        
        document.querySelectorAll('.edit-item-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const itemId = btn.getAttribute('data-item-id');
                const item = section.items.find(i => i.id === itemId);
                if (item) {
                    itemNameInput.value = item.name;
                    itemDescInput.value = item.description;
                    itemImageUrl.value = item.imageUrl || '';
                    itemLinkUrl.value = item.link || '';
                    updateImagePreview(item.imageUrl);
                    editingItemMeta = { sectionId: section.id, itemId: item.id };
                    toggleEditor(true);
                }
            });
        });
        
        document.querySelectorAll('.delete-item-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const itemId = btn.getAttribute('data-item-id');
                section.items = section.items.filter(i => i.id !== itemId);
                renderAll();
                showMessage(itemMessage, '🗑 Пункт удалён', false);
            });
        });
    }
    
    function showLinkModal(url) {
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = `
            <div class="modal-content">
                <h4 style="font-size: 1.1rem;">🔗 Перейти по ссылке?</h4>
                <p>${escapeHtml(url.length > 50 ? url.substring(0, 50) + '...' : url)}</p>
                <div class="modal-buttons">
                    <button id="modalYes">✅ Да</button>
                    <button id="modalNo">❌ Нет</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        
        modal.querySelector('#modalYes').onclick = () => {
            window.open(url, '_blank');
            modal.remove();
        };
        modal.querySelector('#modalNo').onclick = () => modal.remove();
        modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
    }
    
    function updateImagePreview(url) {
        if (url && url.trim()) {
            imagePreview.innerHTML = `<img src="${escapeHtml(url)}" style="max-width:3.5rem; border-radius:8px;" onerror="this.style.display='none'">`;
        } else {
            imagePreview.innerHTML = '';
        }
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }
    
    // СОБЫТИЯ
    newSectionBtn.addEventListener('click', createNewSection);
    closeEditorBtn.addEventListener('click', () => toggleEditor(false));
    
    editTitleBtn.addEventListener('click', () => {
        listTitleInput.focus();
        listTitleInput.select();
    });
    
    listTitleInput.addEventListener('blur', saveListTitle);
    listTitleInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') listTitleInput.blur();
    });
    
    exportBtn.addEventListener('click', exportToFile);
    
    importFileInput.addEventListener('change', (e) => {
        if (e.target.files && e.target.files[0]) {
            importFromFile(e.target.files[0]);
            e.target.value = '';
        }
    });
    
    document.getElementById('addItemBtn')?.addEventListener('click', () => {
        if (!selectedSectionId) {
            showMessage(itemMessage, '⚠️ Сначала выберите раздел', true);
            return;
        }
        const name = itemNameInput.value.trim();
        if (!name) {
            showMessage(itemMessage, '⚠️ Введите название пункта!', true);
            return;
        }
        const section = allSections.find(s => s.id === selectedSectionId);
        if (!section) return;
        
        if (editingItemMeta && editingItemMeta.sectionId === selectedSectionId) {
            const item = section.items.find(i => i.id === editingItemMeta.itemId);
            if (item) {
                item.name = name;
                item.description = itemDescInput.value.trim();
                item.imageUrl = itemImageUrl.value.trim();
                item.link = itemLinkUrl.value.trim();
                editingItemMeta = null;
                clearItemForm();
                renderAll();
                showMessage(itemMessage, '✏️ Пункт обновлён', false);
                toggleEditor(false);
                return;
            }
        }
        
        section.items.push({
            id: Date.now() + '-' + Math.random(),
            name: name,
            description: itemDescInput.value.trim(),
            imageUrl: itemImageUrl.value.trim(),
            link: itemLinkUrl.value.trim(),
            checked: false,
            collapsed: true
        });
        renderAll();
        clearItemForm();
        showMessage(itemMessage, '✅ Новый пункт добавлен', false);
        toggleEditor(false);
    });
    
    function clearItemForm() {
        itemNameInput.value = '';
        itemDescInput.value = '';
        itemImageUrl.value = '';
        itemLinkUrl.value = '';
        imagePreview.innerHTML = '';
        editingItemMeta = null;
    }
    
    document.getElementById('clearItemFormBtn')?.addEventListener('click', clearItemForm);
    itemImageUrl?.addEventListener('input', (e) => updateImagePreview(e.target.value));
    
    settingsToggleBtn?.addEventListener('click', () => toggleSettings(!isSettingsVisible));
    closeSettingsBtn?.addEventListener('click', () => toggleSettings(false));
    themeToggleCheckbox?.addEventListener('change', toggleTheme);
    
    document.querySelectorAll('.scale-btn').forEach(btn => {
        btn.addEventListener('click', () => setScale(btn.getAttribute('data-scale')));
    });
    
    // ЗАПУСК
    loadListTitle();
    loadFromLocalStorage();
    loadTheme();
    loadScale();
    if (allSections.length > 0 && !selectedSectionId) selectedSectionId = allSections[0].id;
    renderAll();
    toggleEditor(false);
    toggleSettings(false);
</script>
</body>
</html>
